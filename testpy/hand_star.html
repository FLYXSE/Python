<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Звезда на руке</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
        }
        .main-container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }
        .container {
            position: relative;
        }
        video {
            display: none;
        }
        canvas {
            border: 2px solid #333;
            border-radius: 8px;
        }
        .control-panel {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            width: 280px;
            color: #fff;
        }
        .control-panel h3 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #FFD700;
        }
        .control-group {
            margin-bottom: 20px;
        }
        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .toggle-switch {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        .toggle-switch input[type="checkbox"] {
            width: 40px;
            height: 20px;
            margin-right: 10px;
            cursor: pointer;
        }
        input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        input[type="range"] {
            width: 100%;
            margin-top: 5px;
        }
        .color-input-group {
            margin-bottom: 15px;
        }
        .range-value {
            display: inline-block;
            margin-left: 10px;
            color: #FFD700;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="container">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
        </div>

        <div class="control-panel">
            <h3>Настройки</h3>

            <div class="control-group">
                <div class="toggle-switch">
                    <input type="checkbox" id="showStar" checked>
                    <label for="showStar">Показать звезду</label>
                </div>

                <div class="toggle-switch">
                    <input type="checkbox" id="showPoints" checked>
                    <label for="showPoints">Показать точки</label>
                </div>

                <div class="toggle-switch">
                    <input type="checkbox" id="showSkeleton" checked>
                    <label for="showSkeleton">Показать скелет руки</label>
                </div>

                <div class="toggle-switch">
                    <input type="checkbox" id="showFaceMask">
                    <label for="showFaceMask">Маска на лицо</label>
                </div>
            </div>

            <div class="control-group">
                <h4 style="margin-bottom: 10px;">Цвета</h4>

                <div class="color-input-group">
                    <label for="starFillColor">Заливка звезды:</label>
                    <input type="color" id="starFillColor" value="#FFD700">
                </div>

                <div class="color-input-group">
                    <label for="starStrokeColor">Обводка звезды:</label>
                    <input type="color" id="starStrokeColor" value="#FFA500">
                </div>

                <div class="color-input-group">
                    <label for="pointColor">Цвет точек:</label>
                    <input type="color" id="pointColor" value="#FF4444">
                </div>
            </div>

            <div class="control-group">
                <label>
                    Толщина линий: <span class="range-value" id="lineWidthValue">3</span>
                </label>
                <input type="range" id="lineWidth" min="1" max="10" value="3">

                <label style="margin-top: 10px;">
                    Размер точек: <span class="range-value" id="pointSizeValue">8</span>
                </label>
                <input type="range" id="pointSize" min="3" max="20" value="8">
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 1280;
        canvas.height = 720;

        // Настройки
        const settings = {
            showStar: true,
            showPoints: true,
            showSkeleton: true,
            showFaceMask: false,
            starFillColor: '#FFD700',
            starStrokeColor: '#FFA500',
            pointColor: '#FF4444',
            lineWidth: 3,
            pointSize: 8
        };

        // Загрузка изображения маски
        const catMask = new Image();
        catMask.src = 'cats.jpeg';

        // Обработчики элементов управления
        document.getElementById('showStar').addEventListener('change', (e) => {
            settings.showStar = e.target.checked;
        });

        document.getElementById('showPoints').addEventListener('change', (e) => {
            settings.showPoints = e.target.checked;
        });

        document.getElementById('showSkeleton').addEventListener('change', (e) => {
            settings.showSkeleton = e.target.checked;
        });

        document.getElementById('showFaceMask').addEventListener('change', (e) => {
            settings.showFaceMask = e.target.checked;
        });

        document.getElementById('starFillColor').addEventListener('input', (e) => {
            settings.starFillColor = e.target.value;
        });

        document.getElementById('starStrokeColor').addEventListener('input', (e) => {
            settings.starStrokeColor = e.target.value;
        });

        document.getElementById('pointColor').addEventListener('input', (e) => {
            settings.pointColor = e.target.value;
        });

        document.getElementById('lineWidth').addEventListener('input', (e) => {
            settings.lineWidth = parseInt(e.target.value);
            document.getElementById('lineWidthValue').textContent = e.target.value;
        });

        document.getElementById('pointSize').addEventListener('input', (e) => {
            settings.pointSize = parseInt(e.target.value);
            document.getElementById('pointSizeValue').textContent = e.target.value;
        });

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        const faceDetection = new FaceDetection({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
        });

        faceDetection.setOptions({
            model: 'short',
            minDetectionConfidence: 0.5
        });

        let faceDetections = [];
        let frameCount = 0;

        faceDetection.onResults((results) => {
            faceDetections = results.detections || [];
        });

        hands.onResults(onResults);

        async function processFrame() {
            frameCount++;

            // Обрабатываем руки каждый кадр
            await hands.send({image: video});

            // Обрабатываем лицо только каждый 3-й кадр для оптимизации
            if (settings.showFaceMask && frameCount % 3 === 0) {
                await faceDetection.send({image: video});
            }
        }

        function drawStar(points) {
            if (points.length !== 5 || !settings.showStar) return;

            ctx.fillStyle = settings.starFillColor;
            ctx.strokeStyle = settings.starStrokeColor;
            ctx.lineWidth = settings.lineWidth;

            ctx.beginPath();

            const order = [0, 2, 4, 1, 3, 0];

            ctx.moveTo(points[order[0]].x, points[order[0]].y);
            for (let i = 1; i < order.length; i++) {
                ctx.lineTo(points[order[i]].x, points[order[i]].y);
            }

            ctx.closePath();
            ctx.fill();
            ctx.stroke();
        }

        function drawHandSkeleton(landmarks) {
            if (!settings.showSkeleton) return;

            const connections = [
                [0, 1], [1, 2], [2, 3], [3, 4],
                [0, 5], [5, 6], [6, 7], [7, 8],
                [0, 9], [9, 10], [10, 11], [11, 12],
                [0, 13], [13, 14], [14, 15], [15, 16],
                [0, 17], [17, 18], [18, 19], [19, 20],
                [5, 9], [9, 13], [13, 17]
            ];

            ctx.strokeStyle = '#00FF00';
            ctx.lineWidth = 2;

            connections.forEach(([start, end]) => {
                ctx.beginPath();
                ctx.moveTo(
                    landmarks[start].x * canvas.width,
                    landmarks[start].y * canvas.height
                );
                ctx.lineTo(
                    landmarks[end].x * canvas.width,
                    landmarks[end].y * canvas.height
                );
                ctx.stroke();
            });
        }

        function onResults(results) {
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            // Рисуем маску на лицо
            if (settings.showFaceMask && faceDetections.length > 0) {
                faceDetections.forEach(detection => {
                    const bbox = detection.boundingBox;
                    const x = bbox.xCenter * canvas.width - (bbox.width * canvas.width) / 2;
                    const y = bbox.yCenter * canvas.height - (bbox.height * canvas.height) / 2;
                    const width = bbox.width * canvas.width;
                    const height = bbox.height * canvas.height;

                    // Увеличиваем размер маски для лучшего покрытия
                    const scale = 1.5;
                    const scaledWidth = width * scale;
                    const scaledHeight = height * scale;
                    const offsetX = (scaledWidth - width) / 2;
                    const offsetY = (scaledHeight - height) / 2;

                    ctx.drawImage(
                        catMask,
                        x - offsetX,
                        y - offsetY,
                        scaledWidth,
                        scaledHeight
                    );
                });
            }

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    if (settings.showSkeleton) {
                        drawHandSkeleton(landmarks);
                    }

                    const fingerTips = [4, 8, 12, 16, 20];
                    const points = fingerTips.map(index => ({
                        x: landmarks[index].x * canvas.width,
                        y: landmarks[index].y * canvas.height
                    }));

                    drawStar(points);

                    if (settings.showPoints) {
                        points.forEach(point => {
                            ctx.beginPath();
                            ctx.arc(point.x, point.y, settings.pointSize, 0, 2 * Math.PI);
                            ctx.fillStyle = settings.pointColor;
                            ctx.fill();
                            ctx.strokeStyle = '#FFFFFF';
                            ctx.lineWidth = 2;
                            ctx.stroke();
                        });
                    }
                }
            }

            ctx.restore();
        }

        const camera = new Camera(video, {
            onFrame: processFrame,
            width: 1280,
            height: 720
        });

        camera.start();
    </script>
</body>
</html>
